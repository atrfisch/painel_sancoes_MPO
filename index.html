<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sanção Presidencial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Custom scrollbar para as listas de resumo */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8 text-slate-800 antialiased selection:bg-blue-200">
    <div class="max-w-7xl mx-auto space-y-8">
        
        <header class="flex flex-col md:flex-row md:items-end justify-between border-b pb-5 border-slate-200">
            <div>
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-10 h-10 bg-green-600 text-white rounded-lg flex items-center justify-center shadow-md">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.315 48.315 0 0012 9.75c-2.551 0-5.056.2-7.5.582V21M3 21h18M12 6.75h.008v.008H12V6.75z" />
                        </svg>
                    </div>
                    <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Painel de Sanções</h1>
                </div>
                <p class="text-slate-500 font-medium">Acompanhamento dos prazos de matérias aguardando deliberação da Presidência.</p>
            </div>
            <div class="mt-4 md:mt-0 bg-white px-4 py-2 rounded-full border border-slate-200 shadow-sm text-sm font-semibold text-slate-600 flex items-center gap-2">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                Atualizado: <span id="current-date-display">Hoje</span>
            </div>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Card: Hoje -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden flex flex-col h-80">
                <div class="absolute top-0 left-0 w-full h-1 bg-red-500"></div>
                <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    Expiram Hoje
                </h2>
                <div id="hoje-list" class="flex-1 overflow-y-auto custom-scroll space-y-3 pr-2">
                    <!-- Conteúdo injetado via JS -->
                </div>
            </div>

            <!-- Card: Próxima Semana (7 dias) -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden flex flex-col h-80">
                <div class="absolute top-0 left-0 w-full h-1 bg-amber-400"></div>
                <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    Expiram na Próxima Semana (7 dias)
                </h2>
                <div id="semana-list" class="flex-1 overflow-y-auto custom-scroll space-y-3 pr-2">
                    <!-- Conteúdo injetado via JS -->
                </div>
            </div>
        </section>

        <section class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-xl font-bold text-slate-800 mb-8 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                </svg>
                Linha do Tempo (Próximos Vencimentos)
            </h2>
            <div class="pl-4">
                <ol class="relative border-l-2 border-slate-200" id="timeline-list">
                    <!-- Conteúdo injetado via JS -->
                </ol>
            </div>
        </section>

        <section class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
                </svg>
                Lista Completa de Matérias
            </h2>
            <div class="overflow-x-auto rounded-lg border border-slate-200">
                <table class="w-full text-left text-slate-600">
                    <thead class="text-xs uppercase bg-slate-100 text-slate-700">
                        <tr>
                            <th class="px-5 py-4 font-bold tracking-wider text-center" title="Marcar como Interesse do MPO">MPO</th>
                            <th class="px-5 py-4 font-bold tracking-wider">Matéria</th>
                            <th class="px-5 py-4 font-bold tracking-wider">Ementa</th>
                            <th class="px-5 py-4 font-bold tracking-wider whitespace-nowrap">Recebimento</th>
                            <th class="px-5 py-4 font-bold tracking-wider whitespace-nowrap">Prazo Sanção</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100 bg-white text-sm">
                        <!-- Conteúdo injetado via JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        // Função utilitária para formatar a data para o padrão PT-BR
        const formatDate = (isoStr) => {
            const [y, m, d] = isoStr.split('-');
            return `${d}/${m}/${y}`;
        };

        // Dados extraídos (Mockados do portal do Congresso)
        const dados = [
            { materia: "PL 5868/2025", ementa: "Dispõe sobre os direitos de pessoas com diabetes mellitus tipo 1...", recebimento: "2026-06-03", prazo: "2026-07-08" },
            { materia: "PL 6223/2023", ementa: "Inclui no Calendário Turístico Oficial do Brasil as datas das romarias do Município de Juazeiro do Norte...", recebimento: "2026-06-09", prazo: "2026-06-29" },
            { materia: "PL 1986/2024", ementa: "Institui campanhas de conscientização sobre os sintomas dos principais tipos de câncer infantil...", recebimento: "2026-06-09", prazo: "2026-06-29" },
            { materia: "PL 5057/2023", ementa: "Cria a Rota Turística da Fé, no Estado do Ceará.", recebimento: "2026-06-09", prazo: "2026-06-29" },
            { materia: "PL 3428/2023", ementa: "Fixa o limite máximo permitido de chumbo em tintas e em materiais similares...", recebimento: "2026-06-09", prazo: "2026-06-29" },
            { materia: "PL 3758/2023", ementa: "Cria a Rota Turística das Cidades Coloniais Alagoanas, no Estado de Alagoas.", recebimento: "2026-06-09", prazo: "2026-06-29" },
            { materia: "PL 2940/2023", ementa: "Torna obrigatória a criação de comissão de prevenção de tromboembolismo venoso nos hospitais.", recebimento: "2026-06-10", prazo: "2026-06-30" },
            { materia: "PL 2142/2025", ementa: "Revoga condições para o registro de medicamentos e insumos farmacêuticos de procedência estrangeira.", recebimento: "2026-06-10", prazo: "2026-06-30" },
            { materia: "PL 2992/2023", ementa: "Cria o Roteiro Turístico Caminhos da Fé, nos Estados de Minas Gerais e de São Paulo.", recebimento: "2026-06-10", prazo: "2026-06-30" },
            { materia: "PL 8324/2014", ementa: "Institui medidas destinadas à prevenção do uso inadequado de psicofármacos em crianças e adolescentes.", recebimento: "2026-06-10", prazo: "2026-06-30" },
            { materia: "PL 789/2024", ementa: "Inscreve o nome de Ayrton Senna da Silva no Livro dos Heróis e Heroínas da Pátria.", recebimento: "2026-06-10", prazo: "2026-06-30" },
            { materia: "PL 996/2023", ementa: "Garante o abastecimento de cestas básicas à rede de acolhimento a mulheres em situação de violência...", recebimento: "2026-06-11", prazo: "2026-07-01" },
            { materia: "PL 7801/2010", ementa: "Determina a observância do Dia Mundial em Memória das Vítimas de Acidentes de Trânsito.", recebimento: "2026-06-11", prazo: "2026-07-01" },
            { materia: "PL 3663/2023", ementa: "Inscreve o nome de Pedro Jorge de Melo e Silva no Livro dos Heróis e Heroínas da Pátria.", recebimento: "2026-06-11", prazo: "2026-07-01" },
            { materia: "PL 2896/2024", ementa: "Confere o título de Capital Nacional da Louça ao Município de Campo Largo, no Estado do Paraná.", recebimento: "2026-06-15", prazo: "2026-07-03" },
            { materia: "PLP 55/2026", ementa: "Estabelece condições à concessão de isenção do ISS para a Copa do Mundo Feminina da FIFA 2027.", recebimento: "2026-06-15", prazo: "2026-07-03" },
            { materia: "PL 5760/2023", ementa: "Estabelece medidas de proteção e acolhimento a trabalhadores resgatados de condição análoga à de escravo.", recebimento: "2026-06-15", prazo: "2026-07-03" },
            { materia: "PLC 121/2015", ementa: "Regulamenta a profissão de protesista/ortesista ortopédico.", recebimento: "2026-06-15", prazo: "2026-07-03" },
            { materia: "PLP 128/2022", ementa: "Destina recursos do Funpen à capacitação dos servidores do sistema penitenciário nacional.", recebimento: "2026-06-15", prazo: "2026-07-03" },
            { materia: "PL 2199/2022", ementa: "Estabelece a utilização do Símbolo Internacional de Acessibilidade.", recebimento: "2026-06-18", prazo: "2026-07-08" },
            { materia: "PL 3801/2004", ementa: "Institui o Dia Nacional do Vinho.", recebimento: "2026-06-18", prazo: "2026-07-08" },
            { materia: "PL 2379/2023", ementa: "Institui o Dia Nacional dos Congados e Reinados.", recebimento: "2026-06-23", prazo: "2026-07-13" },
            { materia: "PL 4088/2023", ementa: "Inclui educação política e direitos da cidadania como componente curricular da educação básica.", recebimento: "2026-06-23", prazo: "2026-07-13" },
            { materia: "PL 1960/2022", ementa: "Confere o título de Capital Nacional da Maior Onda do Brasil a Jaguaruna - SC.", recebimento: "2026-06-23", prazo: "2026-07-13" },
            { materia: "PL 96/2024", ementa: "Especifica atividades para aperfeiçoamento profissional da educação básica pública.", recebimento: "2026-06-23", prazo: "2026-07-13" },
            { materia: "PL 5672/2025", ementa: "Transferência simbólica da sede do Governo Federal para Salvador - BA em 2 de julho.", recebimento: "2026-06-23", prazo: "2026-07-13" },
            { materia: "PL 4368/2020", ementa: "Institui o Mês Nacional de Conscientização da Fibrose Cística - Setembro Roxo.", recebimento: "2026-06-23", prazo: "2026-07-13" },
            { materia: "PL 6133/2025", ementa: "Cria a Universidade Federal do Esporte.", recebimento: "2026-06-23", prazo: "2026-07-13" },
            { materia: "PL 2522/2021", ementa: "Confere o título de Capital Nacional do Açafrão ao Município de Mara Rosa - GO.", recebimento: "2026-06-23", prazo: "2026-07-13" },
            { materia: "PL 6113/2023", ementa: "Cria o Banco Nacional de Boas Práticas na Prevenção e Combate à Violência contra a Mulher.", recebimento: "2026-06-23", prazo: "2026-07-13" },
            { materia: "PL 162/2024", ementa: "Institui a Semana Nacional da Ética e da Cidadania.", recebimento: "2026-06-23", prazo: "2026-07-13" }
        ];

        // Carrega interesses salvos no LocalStorage para não perder ao recarregar
        const savedMpoInterests = JSON.parse(localStorage.getItem('mpoInterests')) || {};
        dados.forEach(d => {
            d.interesseMpo = !!savedMpoInterests[d.materia];
        });

        // Lógica de tempo - Zera as horas para comparação exata de dias
        const today = new Date();
        today.setHours(0,0,0,0);
        
        // Define o limite de 1 semana (7 dias)
        const nextWeek = new Date(today);
        nextWeek.setDate(nextWeek.getDate() + 7);

        // Atualizar display do cabeçalho
        const dataOpcoes = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date-display').innerText = today.toLocaleDateString('pt-BR', dataOpcoes);

        const hojeList = document.getElementById('hoje-list');
        const semanaList = document.getElementById('semana-list');
        const timelineList = document.getElementById('timeline-list');
        const tableBody = document.getElementById('table-body');
        
        function renderDashboard() {
            // Limpa containers para re-renderização completa
            hojeList.innerHTML = '';
            semanaList.innerHTML = '';
            timelineList.innerHTML = '';
            tableBody.innerHTML = '';
            
            const timelineData = {};

            dados.forEach(item => {
                // Renderiza tabela completa com checkbox
                const rowClass = item.interesseMpo ? 'bg-indigo-50/70 hover:bg-indigo-100' : 'hover:bg-slate-50';
                tableBody.innerHTML += `
                    <tr class="${rowClass} transition-colors duration-150">
                        <td class="px-5 py-4 border-b border-slate-100 text-center">
                            <input type="checkbox" class="mpo-toggle w-5 h-5 text-indigo-600 bg-gray-100 border-gray-300 rounded cursor-pointer accent-indigo-600" data-materia="${item.materia}" ${item.interesseMpo ? 'checked' : ''}>
                        </td>
                        <td class="px-5 py-4 border-b border-slate-100 font-semibold text-slate-800 whitespace-nowrap">
                            ${item.materia}
                            ${item.interesseMpo ? '<span class="ml-2 inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold bg-indigo-200 text-indigo-800 uppercase tracking-widest shadow-sm">MPO</span>' : ''}
                        </td>
                        <td class="px-5 py-4 border-b border-slate-100 text-slate-600 truncate max-w-xs md:max-w-md" title="${item.ementa}">${item.ementa}</td>
                        <td class="px-5 py-4 border-b border-slate-100 whitespace-nowrap text-slate-500">${formatDate(item.recebimento)}</td>
                        <td class="px-5 py-4 border-b border-slate-100 font-bold text-slate-700 whitespace-nowrap">${formatDate(item.prazo)}</td>
                    </tr>
                `;

                const [y, mo, d] = item.prazo.split('-');
                const prazoDate = new Date(y, mo - 1, d);
                prazoDate.setHours(0,0,0,0);
                
                // Tags e Cores MPO para os Cards
                const mpoTag = item.interesseMpo ? `<span class="ml-2 px-2 py-0.5 bg-indigo-600 text-white text-[10px] font-bold rounded shadow-sm flex items-center gap-1 uppercase tracking-wider">⭐ MPO</span>` : '';
                
                // Lógica de Categorização
                if (prazoDate.getTime() === today.getTime()) {
                    // Card Vermelho (Hoje)
                    const borderClass = item.interesseMpo ? 'border-indigo-400 ring-2 ring-indigo-300 bg-indigo-50/50' : 'border-red-100 bg-red-50';
                    hojeList.innerHTML += `
                        <div class="p-4 text-red-900 rounded-xl border transition hover:shadow-md ${borderClass}">
                            <div class="flex justify-between items-center mb-1">
                                <span class="font-bold text-red-700 text-base flex items-center">${item.materia} ${mpoTag}</span>
                                <span class="px-2 py-0.5 bg-red-200 text-red-800 text-xs font-bold rounded">HOJE</span>
                            </div>
                            <p class="text-xs text-red-800/80 line-clamp-2" title="${item.ementa}">${item.ementa}</p>
                        </div>`;
                } else if (prazoDate > today && prazoDate <= nextWeek) {
                    // Card Amarelo (Próxima Semana - 7 dias)
                    const diffTime = Math.abs(prazoDate - today);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    const borderClass = item.interesseMpo ? 'border-indigo-400 ring-2 ring-indigo-300 bg-indigo-50/50' : 'border-amber-100 bg-amber-50';
                    
                    semanaList.innerHTML += `
                        <div class="p-4 text-amber-900 rounded-xl border transition hover:shadow-md ${borderClass}">
                            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-1">
                                <span class="font-bold text-amber-800 text-base flex items-center flex-wrap gap-1">${item.materia} ${mpoTag}</span>
                                <span class="mt-1 sm:mt-0 px-2 py-0.5 bg-white border border-amber-200 text-amber-700 text-xs font-bold rounded shadow-sm whitespace-nowrap">
                                    Faltam ${diffDays} dia(s)
                                </span>
                            </div>
                            <div class="text-xs text-amber-700/80 flex items-center gap-1 mt-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                                Data final: ${formatDate(item.prazo)}
                            </div>
                        </div>`;
                } else if (prazoDate > nextWeek || prazoDate < today) {
                    // Linha do Tempo (Demais Prazos)
                    if (!timelineData[item.prazo]) timelineData[item.prazo] = [];
                    timelineData[item.prazo].push(item);
                }
            });

            const emptyStateSvg = `<svg class="mx-auto h-12 w-12 text-slate-300 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>`;
            
            if(hojeList.innerHTML.trim() === '') {
                hojeList.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-center text-slate-500 px-4 pb-8">
                        ${emptyStateSvg}
                        <p class="font-medium">Tudo tranquilo por enquanto.</p>
                        <p class="text-sm text-slate-400 mt-1">Nenhum prazo expira na data de hoje.</p>
                    </div>`;
            }
            if(semanaList.innerHTML.trim() === '') {
                semanaList.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-center text-slate-500 px-4 pb-8">
                        ${emptyStateSvg}
                        <p class="font-medium">Agenda livre.</p>
                        <p class="text-sm text-slate-400 mt-1">Nenhum prazo para os próximos 7 dias.</p>
                    </div>`;
            }

            Object.keys(timelineData).sort().forEach(dateKey => {
                const items = timelineData[dateKey];
                const projetosHtml = items.map(i => {
                    const bgClass = i.interesseMpo ? 'bg-indigo-600 text-white border-indigo-700 shadow-md transform hover:scale-105' : 'bg-slate-50 border-slate-200 text-slate-700 hover:bg-slate-100';
                    const iconColor = i.interesseMpo ? 'text-indigo-200' : 'text-slate-400';
                    return `
                    <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md border text-sm font-semibold shadow-sm transition cursor-default ${bgClass}" title="${i.ementa}">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ${iconColor}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                        ${i.materia}
                    </span>`
                }).join('');
                
                timelineList.innerHTML += `
                    <li class="mb-10 ml-8">
                        <span class="absolute flex items-center justify-center w-6 h-6 bg-blue-100 rounded-full -left-[13px] ring-4 ring-white shadow-sm border border-blue-200">
                            <div class="w-2.5 h-2.5 bg-blue-600 rounded-full"></div>
                        </span>
                        <div class="flex flex-col md:flex-row md:items-center gap-2 mb-3">
                            <h3 class="flex items-center text-lg font-bold text-slate-900 bg-blue-50 px-3 py-1 rounded-md w-fit border border-blue-100">
                                ${formatDate(dateKey)}
                            </h3>
                            <span class="text-sm font-medium text-slate-500 bg-slate-100 px-2 py-1 rounded-full w-fit">
                                ${items.length} matéria(s)
                            </span>
                        </div>
                        <div class="flex flex-wrap gap-2 mt-2">
                            ${projetosHtml}
                        </div>
                    </li>
                `;
            });

            // Adiciona event listeners aos checkboxes para interatividade
            document.querySelectorAll('.mpo-toggle').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    const materiaId = e.target.getAttribute('data-materia');
                    const isChecked = e.target.checked;
                    
                    // 1. Atualiza o objeto em memória
                    const item = dados.find(d => d.materia === materiaId);
                    if (item) item.interesseMpo = isChecked;
                    
                    // 2. Salva no LocalStorage do navegador (persiste ao atualizar a página)
                    const currentSaved = JSON.parse(localStorage.getItem('mpoInterests')) || {};
                    currentSaved[materiaId] = isChecked;
                    localStorage.setItem('mpoInterests', JSON.stringify(currentSaved));
                    
                    // 3. Re-renderiza o painel para refletir a nova cor em todas as seções
                    renderDashboard();
                });
            });
        }

        // Inicia a aplicação
        renderDashboard();
    </script>
</body>
</html>
