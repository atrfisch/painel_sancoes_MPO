    </style>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Card: Hoje -->

                    </svg>
                    Expiram Hoje
                </h2>
                <div id="hoje-list" class="flex-1 overflow-y-auto custom-scroll space-y-3 pr-2"></div>
            </div>
            <!-- Card: Próxima Semana -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 relative overflow-hidden flex flex-col h-80">
                <div class="absolute top-0 left-0 w-full h-1 bg-amber-500"></div>
                <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">

                    </svg>
                    Próximos 7 dias
                </h2>
                <div id="semana-list" class="flex-1 overflow-y-auto custom-scroll space-y-3 pr-2"></div>
            </div>
        </section>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-xl font-bold text-slate-800 mb-8 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                Visão Geral - Linha do Tempo
            </h2>
            <ol class="relative border-l-2 border-slate-200 ml-3" id="timeline-list"></ol>
        </section>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16" /></svg>
                Lista Completa de Matérias
            </h2>
            <div class="overflow-x-auto rounded-xl border border-slate-200">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 uppercase text-[10px] font-bold tracking-wider border-b border-slate-200">
                            <th class="px-5 py-4 w-12 text-center" title="Marcar como Interesse MPO">MPO</th>
                            <th class="px-5 py-4 w-64">Matéria</th>
                            <th class="px-5 py-4">Detalhes & Prazos</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100 bg-white text-sm"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const formatDate = (isoStr) => {
            const [y, m, d] = isoStr.split('-');
            return `${d}/${m}/${y}`;
        };

        // Ordenar os dados por data mais próxima
        dados.sort((a, b) => a.prazo.localeCompare(b.prazo));
        
        const today = new Date();
        today.setHours(0,0,0,0);
        const nextWeek = new Date(today);
        nextWeek.setDate(nextWeek.getDate() + 7);

        const savedMpoInterests = JSON.parse(localStorage.getItem('mpoInterests')) || {};
        
        function atualizarInteresse(materiaId, isChecked) {
            const item = dados.find(d => d.materia === materiaId);
            if (item) item.interesseMpo = isChecked;
            
            const currentSaved = JSON.parse(localStorage.getItem('mpoInterests')) || {};
            currentSaved[materiaId] = isChecked;
            localStorage.setItem('mpoInterests', JSON.stringify(currentSaved));
            
            renderDashboard();
        }

        const hojeList = document.getElementById('hoje-list');
        const semanaList = document.getElementById('semana-list');
        const timelineList = document.getElementById('timeline-list');
        const tableBody = document.getElementById('table-body');
        
        function renderDashboard() {
            hojeList.innerHTML = ''; semanaList.innerHTML = ''; timelineList.innerHTML = ''; tableBody.innerHTML = '';
            const timelineData = {};

            // Remove itens que já venceram (Prazo inferior a Hoje)
            const dadosAtivos = dados.filter(item => {
                const [y, mo, d] = item.prazo.split('-');
                const pDate = new Date(y, mo - 1, d);
                pDate.setHours(0,0,0,0);
                return pDate.getTime() >= today.getTime();
            });

            dadosAtivos.forEach(item => {
                item.interesseMpo = !!savedMpoInterests[item.materia];
                const rowClass = item.interesseMpo ? 'bg-indigo-50/70 hover:bg-indigo-100' : 'hover:bg-slate-50';
                
                tableBody.innerHTML += `
                    <tr class="${rowClass} transition-colors duration-150">
                        <td class="px-5 py-5 border-b border-slate-100 text-center align-middle">
                            <input type="checkbox" class="mpo-toggle w-5 h-5 text-indigo-600 bg-gray-100 border-gray-300 rounded cursor-pointer accent-indigo-600 shadow-sm" data-materia="${item.materia}" ${item.interesseMpo ? 'checked' : ''}>
                        </td>
                        <td class="px-5 py-5 border-b border-slate-100 align-top whitespace-nowrap">
                            <div class="flex flex-col gap-1.5">
                                <a href="https://www.congressonacional.leg.br/materias/materias-aguardando-sancao" target="_blank" class="text-blue-600 font-bold hover:text-blue-800 hover:underline flex items-center gap-1 group w-fit text-base">
                                    ${item.materia}
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-slate-400 group-hover:text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
                                </a>
                                ${item.interesseMpo ? '<span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold bg-indigo-100 text-indigo-800 uppercase tracking-widest border border-indigo-200 shadow-sm w-fit">⭐ MPO</span>' : ''}
                            </div>
                        </td>
                        <td class="px-5 py-5 border-b border-slate-100 align-top">
                            <p class="text-slate-700 text-sm leading-relaxed mb-3 pr-4">${item.ementa}</p>
                            <div class="flex flex-wrap items-center gap-3 text-xs font-semibold">
                                <span class="bg-slate-100 text-slate-600 px-2.5 py-1 rounded border border-slate-200">Recebido em: ${formatDate(item.recebimento)}</span>
                                <span class="bg-rose-50 text-rose-700 px-2.5 py-1 rounded border border-rose-200">Prazo Sanção: ${formatDate(item.prazo)}</span>
                            </div>
                        </td>
                    </tr>
                `;

                const [y, mo, d] = item.prazo.split('-');
                const prazoDate = new Date(y, mo - 1, d);
                prazoDate.setHours(0,0,0,0);
                
                const mpoTag = item.interesseMpo ? `<span class="ml-2 px-2 py-0.5 bg-indigo-600 text-white text-[10px] font-bold rounded shadow-sm flex items-center gap-1 uppercase tracking-wider">MPO</span>` : '';
                
                if (prazoDate.getTime() === today.getTime()) {
                    const borderClass = item.interesseMpo ? 'border-indigo-400 ring-2 ring-indigo-300 bg-indigo-50/50' : 'border-red-100 bg-red-50';
                    hojeList.innerHTML += `
                        <div class="p-4 text-red-900 rounded-xl border transition hover:shadow-md ${borderClass}">
                            <div class="flex justify-between items-center mb-2">
                                <span class="font-bold text-red-700 text-base flex items-center">${item.materia} ${mpoTag}</span>
                                <span class="px-2 py-0.5 bg-red-200 text-red-800 text-xs font-bold rounded">HOJE</span>
                            </div>
                            <p class="text-xs text-red-800/80 line-clamp-2" title="${item.ementa}">${item.ementa}</p>
                        </div>`;
                } else if (prazoDate > today && prazoDate <= nextWeek) {
                    const diffDays = Math.ceil(Math.abs(prazoDate - today) / (1000 * 60 * 60 * 24));
                    const borderClass = item.interesseMpo ? 'border-indigo-400 ring-1 ring-indigo-300 bg-indigo-50' : 'border-amber-200 bg-amber-50/50';
                    const textClass = item.interesseMpo ? 'text-indigo-900' : 'text-amber-900';
                    const titleClass = item.interesseMpo ? 'text-indigo-800' : 'text-amber-800';
                    const badgeClass = item.interesseMpo ? 'bg-white border-indigo-200 text-indigo-700' : 'bg-white border-amber-200 text-amber-700';
                    
                    semanaList.innerHTML += `
                        <div class="p-4 ${textClass} rounded-xl border transition hover:shadow-md ${borderClass}">
                            <div class="flex justify-between items-start mb-2">
                                <span class="font-bold ${titleClass} text-base flex items-center flex-wrap gap-1">${item.materia} ${mpoTag}</span>
                                <span class="px-2 py-0.5 border text-[10px] font-bold rounded uppercase tracking-wider whitespace-nowrap ${badgeClass}">
                                    Faltam ${diffDays} dias
                                </span>
                            </div>
                            <div class="text-xs opacity-80 flex items-center gap-1 font-medium bg-white/50 w-fit px-2 py-0.5 rounded border border-white">
                                Expira em: ${formatDate(item.prazo)}
                            </div>
                        </div>`;
                } else {
                    if (!timelineData[item.prazo]) timelineData[item.prazo] = [];
                    timelineData[item.prazo].push(item);
                }
            });

            const emptyStateSvg = `<svg class="mx-auto h-12 w-12 text-slate-200 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>`;
            if(hojeList.innerHTML.trim() === '') hojeList.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-center px-4 pb-8">${emptyStateSvg}<p class="font-semibold text-slate-500">Tudo limpo.</p><p class="text-sm text-slate-400 mt-1">Nenhum prazo expira hoje.</p></div>`;
            if(semanaList.innerHTML.trim() === '') semanaList.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-center px-4 pb-8">${emptyStateSvg}<p class="font-semibold text-slate-500">Sem pressa.</p><p class="text-sm text-slate-400 mt-1">Nenhum prazo expira nos próximos 7 dias.</p></div>`;

            Object.keys(timelineData).sort().forEach(dateKey => {
                const items = timelineData[dateKey];
                const projetosHtml = items.map(i => {
                    const bgClass = i.interesseMpo ? 'bg-indigo-600 text-white border-indigo-700 shadow-md transform hover:scale-105' : 'bg-slate-50 border-slate-200 text-slate-700 hover:bg-slate-100';
                    const iconColor = i.interesseMpo ? 'text-indigo-200' : 'text-slate-400';
                    return `<span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md border text-sm font-semibold shadow-sm transition cursor-default ${bgClass}" title="${i.ementa}"><svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 ${iconColor}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>${i.materia}</span>`;
                }).join('');
                
                timelineList.innerHTML += `
                    <li class="mb-10 ml-8">
                        <span class="absolute flex items-center justify-center w-6 h-6 bg-slate-100 rounded-full -left-[13px] ring-4 ring-white shadow-sm border border-slate-200"><div class="w-2.5 h-2.5 bg-slate-400 rounded-full"></div></span>
                        <div class="flex flex-col md:flex-row md:items-center gap-3 mb-3">
                            <h3 class="flex items-center text-lg font-bold text-slate-800">${formatDate(dateKey)}</h3>
                            <span class="text-xs font-bold uppercase tracking-wider text-slate-500 bg-slate-100 border border-slate-200 px-2 py-1 rounded-md w-fit">${items.length} matéria(s)</span>
                        </div>
                        <div class="flex flex-wrap gap-2">${projetosHtml}</div>
                    </li>`;
            });

            document.querySelectorAll('.mpo-toggle').forEach(checkbox => {
                checkbox.addEventListener('change', (e) => {
                    atualizarInteresse(e.target.getAttribute('data-materia'), e.target.checked);
                });
            });
        }

        renderDashboard();
    </script>
</body>
</html>
