name: Atualizar Dashboard Diariamente

on:
  schedule:
    - cron: '0 3 * * *' # Executa todo dia às 03:00 UTC
  workflow_dispatch:      # Permite disparo manual na aba Actions

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necessário para o script commitar as mudanças no index.html

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install requests beautifulsoup4

      - name: Executar script de atualização
        run: python atualizador.py

      - name: Commit e Push das mudanças
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Robô: Atualização automática dos dados de sanção" && git push)
